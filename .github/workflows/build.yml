name: Build Flet APK

on:
  workflow_dispatch: # لتشغيل البناء يدوياً من واجهة GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.28.3
          # البحث عن ملف requirements.txt وتثبيته إن وُجد في أي مكان
          find . -name "requirements.txt" -exec pip install -r {} \;

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Build APK (Smart Finder)
        # هذا السطر يعمل كرادار للبحث عن ملف main.py وبناء التطبيق من مكانه
        run: |
          TARGET_DIR=$(dirname $(find . -name "main.py" | head -n 1))
          echo "Found main.py in directory: $TARGET_DIR"
          cd "$TARGET_DIR"
          flet build apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartPharmacy-APK
          # هذا المسار سيلتقط ملف الـ APK مهما كان المجلد الذي تم البناء فيه
          path: "**/build/apk/**/*.apk"
