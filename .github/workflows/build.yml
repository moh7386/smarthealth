name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix Configuration and Build APK
        run: |
          # 1. إصلاح الخلل البرمجي في ملف pyproject.toml أوتوماتيكياً
          echo "Fixing pyproject.toml path..."
          if [ -f "pyproject.toml" ]; then
            sed -i 's/path = "main.py"/path = "."/g' pyproject.toml
          fi
          
          # 2. أمر البناء المباشر والصريح
          echo "Starting Flet build process..."
          flet build apk . --module-name main

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartHealth-APK
          path: '**/*.apk'
