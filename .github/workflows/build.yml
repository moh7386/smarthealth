name: Build Flet APK

on:
  workflow_dispatch: # لتشغيل البناء يدوياً من واجهة GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.28.3
          # إذا كان لديك ملف requirements.txt سيتم تثبيته أيضاً
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          if [ -f "smarthealth-main/requirements.txt" ]; then pip install -r smarthealth-main/requirements.txt; fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        # هذا السطر يحل مشكلة التراخيص نهائياً
        run: yes | flutter doctor --android-licenses

      - name: Build APK
        # هذا السطر يحل مشكلة عدم العثور على main.py
        run: |
          if [ -d "smarthealth-main" ]; then
            cd smarthealth-main
          fi
          flet build apk .

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartPharmacy-APK
          # مسار ذكي لالتقاط ملف الـ APK أياً كان مكانه
          path: "**/build/apk/app-release.apk"
